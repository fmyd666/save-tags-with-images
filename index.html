<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TagGallery - 用图片保存tag</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230e7c6b'/%3E%3Cpath d='M18 42 30 22l8 12 5-7 6 15H18Z' fill='white'/%3E%3Ccircle cx='45' cy='19' r='5' fill='%23d9563a'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="工具栏">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>用图片保存tag</h1>
            <p>图片参考 + tag 收藏</p>
          </div>
        </div>

        <section class="panel import-panel" aria-labelledby="import-title">
          <div class="panel-heading">
            <h2 id="import-title">导入</h2>
            <span id="storageStatus" class="status-dot">IndexedDB</span>
          </div>
          <label id="dropZone" class="drop-zone" for="fileInput">
            <input id="fileInput" type="file" accept="image/png,image/webp,image/jpeg" multiple />
            <span class="drop-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M12 3v12m0-12 4.5 4.5M12 3 7.5 7.5" />
                <path d="M5 14.5V18a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3v-3.5" />
              </svg>
            </span>
            <strong>拖入图片或点击选择</strong>
            <span>读取图片里的 tag，并保存成参考卡片</span>
          </label>
          <div class="action-grid">
            <button id="pickFolderButton" class="secondary-button" type="button" title="选择本地保存目录">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3.5 7.5a2 2 0 0 1 2-2H10l2 2h6.5a2 2 0 0 1 2 2v7a3 3 0 0 1-3 3h-11a3 3 0 0 1-3-3v-9Z" />
              </svg>
              本地目录
            </button>
            <button id="exportButton" class="secondary-button" type="button" title="导出索引 JSON">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4v11m0 0 4-4m-4 4-4-4" />
                <path d="M5 19h14" />
              </svg>
              导出索引
            </button>
          </div>
        </section>

        <section class="panel" aria-labelledby="filters-title">
          <div class="panel-heading">
            <h2 id="filters-title">筛选</h2>
            <button id="clearButton" class="icon-button danger" type="button" title="清空本地收藏" aria-label="清空本地收藏">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 7h16" />
                <path d="M9 7V5.8A1.8 1.8 0 0 1 10.8 4h2.4A1.8 1.8 0 0 1 15 5.8V7" />
                <path d="M18 7l-.7 11.2A2 2 0 0 1 15.3 20H8.7a2 2 0 0 1-2-1.8L6 7" />
              </svg>
            </button>
          </div>
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.3-4.3" />
              <circle cx="11" cy="11" r="7" />
            </svg>
            <input id="searchInput" type="search" placeholder="搜索 tag、备注、分类" autocomplete="off" />
          </div>
          <div class="filter-block" aria-label="分类标签">
            <div class="filter-title category-filter-title">
              <span>分类标签</span>
              <button id="newCategoryButton" class="category-add-button" type="button" title="新建分类标签" aria-label="新建分类标签">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14" />
                  <path d="M5 12h14" />
                </svg>
              </button>
            </div>
            <div id="sectionList" class="section-list"></div>
          </div>
          <div class="segmented" role="group" aria-label="卡片视图密度">
            <button class="segment is-active" data-view="comfort" type="button">宽松</button>
            <button class="segment" data-view="compact" type="button">紧凑</button>
          </div>
          <div id="tagCloud" class="tag-cloud" aria-label="常用标签"></div>
        </section>
      </aside>

      <section class="workspace" aria-label="图片卡片">
        <header class="topbar">
          <div>
            <p class="eyeline">Tag Reference Archive</p>
            <h2>用图片保存tag</h2>
          </div>
          <div class="topbar-actions">
            <div class="stats" aria-label="统计">
              <span><strong id="totalCount">0</strong> 张</span>
              <span><strong id="visibleCount">0</strong> 显示</span>
              <span><strong id="tagCount">0</strong> tags</span>
            </div>
            <button id="exitAppButton" class="icon-button exit-app-button" type="button" title="退出软件" aria-label="退出软件">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v9" />
                <path d="M18.4 6.6a8 8 0 1 1-12.8 0" />
              </svg>
            </button>
          </div>
        </header>

        <div class="gallery-scroll">
          <section id="emptyState" class="empty-state">
            <div class="empty-copy">
              <h3>把喜欢的效果存成 tag 卡片</h3>
              <p>导入 ComfyUI 图片后，只把收藏 tag 放在卡片外面；完整 prompt、模型和参数点开图片再看。</p>
            </div>
            <div class="empty-preview" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </section>

          <section id="gallery" class="gallery" aria-live="polite"></section>
        </div>
      </section>
    </main>

    <dialog id="detailDialog" class="detail-dialog">
      <button id="closeDialogButton" class="icon-button dialog-close" type="button" title="关闭" aria-label="关闭">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
      <div id="dialogContent" class="dialog-content"></div>
    </dialog>

    <dialog id="imageViewerDialog" class="image-viewer-dialog">
      <button id="downloadImageViewerButton" class="icon-button viewer-download" type="button" title="下载原图" aria-label="下载原图">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3v12" />
          <path d="m7 10 5 5 5-5" />
          <path d="M5 21h14" />
        </svg>
      </button>
      <button id="closeImageViewerButton" class="icon-button dialog-close viewer-close" type="button" title="关闭" aria-label="关闭">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
      <div id="imageViewerContent" class="image-viewer-content"></div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
